services:
  kafka:
    environment:
      KAFKA_LISTENERS: INTERNAL://:29092,EXTERNAL://:9092
      KAFKA_ADVERTISED_LISTENERS: INTERNAL://kafka:29092,EXTERNAL://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_CREATE_TOPICS: "posture-data:1:1,challenge-events:1:1"
      KAFKA_JMX_OPTS: "-Dcom.sun.management.jmxremote -Dcom.sun.management.jmxremote.authenticate=false -Dcom.sun.management.jmxremote.ssl=false -Djava.rmi.server.hostname=localhost -Dcom.sun.management.jmxremote.rmi.port=9999"
      JMX_PORT: 9999

  mysql:
    environment:
      MYSQL_ROOT_PASSWORD: local_root_password
      MYSQL_DATABASE: fit_challenge_db
      MYSQL_USER: user
      MYSQL_PASSWORD: local_password
      MYSQL_ROOT_HOST: "%"

  gateway-service:
    build:
      context: ./backend/gateway-service
    image: fit-challenge/gateway:local
    ports:
      - "8080:8080"

  auth-service:
    build:
      context: ./backend/auth-service
    image: fit-challenge/auth:local
    environment:
      SPRING_PROFILES_ACTIVE: docker
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/fit_challenge_db?useSSL=false&allowPublicKeyRetrieval=true
      SPRING_DATASOURCE_USERNAME: user
      SPRING_DATASOURCE_PASSWORD: local_password
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      SPRING_REDIS_HOST: redis
      SPRING_REDIS_PORT: 6379
    ports:
      - "8081:8081"

  challenge-service:
    build:
      context: ./backend/challenge-service
    image: fit-challenge/challenge:local
    environment:
      SPRING_PROFILES_ACTIVE: docker
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/fit_challenge_db?useSSL=false&allowPublicKeyRetrieval=true
      SPRING_DATASOURCE_USERNAME: user
      SPRING_DATASOURCE_PASSWORD: local_password
      SPRING_REDIS_HOST: redis
      SPRING_REDIS_PORT: 6379
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
    ports:
      - "8082:8082"

  ai-service:
    build:
      context: ./ai-service
    image: fit-challenge/ai:local
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      REDIS_HOST: redis
    ports:
      - "5000:5000"

  frontend:
    build:
      context: ./frontend
    image: fit-challenge/frontend:local

  watchtower:
    profiles:
      - deploy
